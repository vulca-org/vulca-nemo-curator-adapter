name: Public candidate CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: public-candidate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-test:
    if: github.repository == 'vulca-org/vulca-nemo-curator-adapter'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[nemo-parquet,dev]"

      - name: Verify curated source boundary and provenance
        run: python scripts/verify_public_candidate.py --root .

      - name: Rebuild NeMo Parquet fixtures from readable sources
        run: >-
          python scripts/build_nemo_image_writer_parquet_fixtures.py
          --source-dir samples
          --out "${{ runner.temp }}/nemo-fixtures"

      - name: Run allowlisted test suite
        run: python -m pytest -p no:cacheprovider -q

      - name: Build wheel and source distribution
        run: python -m build
