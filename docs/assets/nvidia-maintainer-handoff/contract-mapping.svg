<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 420" role="img" aria-labelledby="title desc"><title id="title">Contract and mapping</title><desc id="desc">Required fields are validated; optional values are never invented.</desc><rect width="1440" height="420" rx="28" fill="#f6f8fa"/><text x="48" y="58" font-family="Helvetica" font-size="28" font-weight="700" fill="#1f2328">Contract and mapping</text><text x="48" y="91" font-family="Helvetica" font-size="16" fill="#59636e">Required fields are validated; optional values are never invented.</text><rect x="48.0" y="132" width="319.5" height="206" rx="18" fill="#ffffff" stroke="#b7c4d1" stroke-width="2"/><text x="70.0" y="180" font-family="Helvetica" font-size="20" font-weight="700" fill="#0969da">Required</text><text x="70.0" y="218" font-family="Helvetica" font-size="16" fill="#3f4750"><tspan x="70.0" dy="0">image_id, member_name, metadata,</tspan><tspan x="70.0" dy="24">original_path, tar_file</tspan></text><path d="M 372.5 235 H 384.5" stroke="#0969da" stroke-width="4" stroke-linecap="round"/><rect x="389.5" y="132" width="319.5" height="206" rx="18" fill="#ffffff" stroke="#b7c4d1" stroke-width="2"/><text x="411.5" y="180" font-family="Helvetica" font-size="20" font-weight="700" fill="#0969da">Optional</text><text x="411.5" y="218" font-family="Helvetica" font-size="16" fill="#3f4750"><tspan x="411.5" dy="0">aesthetic_score, nsfw_score</tspan></text><path d="M 714.0 235 H 726.0" stroke="#0969da" stroke-width="4" stroke-linecap="round"/><rect x="731.0" y="132" width="319.5" height="206" rx="18" fill="#ffffff" stroke="#b7c4d1" stroke-width="2"/><text x="753.0" y="180" font-family="Helvetica" font-size="20" font-weight="700" fill="#0969da">Mapping</text><text x="753.0" y="218" font-family="Helvetica" font-size="16" fill="#3f4750"><tspan x="753.0" dy="0">image_id -&gt; asset_id;</tspan><tspan x="753.0" dy="24">tar_file#member_name -&gt; uri;</tspan><tspan x="753.0" dy="24">source_url|url -&gt; source_url;</tspan><tspan x="753.0" dy="24">caption|text -&gt; caption</tspan></text><path d="M 1055.5 235 H 1067.5" stroke="#0969da" stroke-width="4" stroke-linecap="round"/><rect x="1072.5" y="132" width="319.5" height="206" rx="18" fill="#ffffff" stroke="#b7c4d1" stroke-width="2"/><text x="1094.5" y="180" font-family="Helvetica" font-size="20" font-weight="700" fill="#0969da">Provenance</text><text x="1094.5" y="218" font-family="Helvetica" font-size="16" fill="#3f4750"><tspan x="1094.5" dy="0">sidecar filename, row number, raw</tspan><tspan x="1094.5" dy="24">metadata, parse status</tspan></text></svg>
