<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 420" role="img" aria-labelledby="title desc"><title id="title">Reproduction evidence</title><desc id="desc">Every public count maps to a shipped source or command.</desc><rect width="1440" height="420" rx="28" fill="#f6f8fa"/><text x="48" y="58" font-family="Helvetica" font-size="28" font-weight="700" fill="#1f2328">Reproduction evidence</text><text x="48" y="91" font-family="Helvetica" font-size="16" fill="#59636e">Every public count maps to a shipped source or command.</text><rect x="48.0" y="132" width="319.5" height="206" rx="18" fill="#ffffff" stroke="#b7c4d1" stroke-width="2"/><text x="70.0" y="180" font-family="Helvetica" font-size="20" font-weight="700" fill="#0969da">Inspect</text><text x="70.0" y="218" font-family="Helvetica" font-size="16" fill="#3f4750"><tspan x="70.0" dy="0">2 + 2 Parquet source rows; 4 JSONL</tspan><tspan x="70.0" dy="24">rows</tspan></text><path d="M 372.5 235 H 384.5" stroke="#0969da" stroke-width="4" stroke-linecap="round"/><rect x="389.5" y="132" width="319.5" height="206" rx="18" fill="#ffffff" stroke="#b7c4d1" stroke-width="2"/><text x="411.5" y="180" font-family="Helvetica" font-size="20" font-weight="700" fill="#0969da">Build</text><text x="411.5" y="218" font-family="Helvetica" font-size="16" fill="#3f4750"><tspan x="411.5" dy="0">Regenerate both Parquet fixtures</tspan><tspan x="411.5" dy="24">from readable JSON</tspan></text><path d="M 714.0 235 H 726.0" stroke="#0969da" stroke-width="4" stroke-linecap="round"/><rect x="731.0" y="132" width="319.5" height="206" rx="18" fill="#ffffff" stroke="#b7c4d1" stroke-width="2"/><text x="753.0" y="180" font-family="Helvetica" font-size="20" font-weight="700" fill="#0969da">Test</text><text x="753.0" y="218" font-family="Helvetica" font-size="16" fill="#3f4750"><tspan x="753.0" dy="0">87 tests in three allowlisted</tspan><tspan x="753.0" dy="24">files</tspan></text><path d="M 1055.5 235 H 1067.5" stroke="#0969da" stroke-width="4" stroke-linecap="round"/><rect x="1072.5" y="132" width="319.5" height="206" rx="18" fill="#ffffff" stroke="#b7c4d1" stroke-width="2"/><text x="1094.5" y="180" font-family="Helvetica" font-size="20" font-weight="700" fill="#0969da">Triage</text><text x="1094.5" y="218" font-family="Helvetica" font-size="16" fill="#3f4750"><tspan x="1094.5" dy="0">Run the source-first fixture and</tspan><tspan x="1094.5" dy="24">inspect generated evidence</tspan></text></svg>
