  "/src/vulca_curator_adapter/packets/__init__.py",
  "/src/vulca_curator_adapter/packets/review_packet.py",
  "/src/vulca_curator_adapter/safety_markers.py",
  "/src/vulca_curator_adapter/schemas.py",
  "/src/vulca_curator_adapter/triage/__init__.py",
  "/src/vulca_curator_adapter/triage/decision.py",
  "/src/vulca_curator_adapter/triage/policies.py",
  "/src/vulca_curator_adapter/writers/__init__.py",
