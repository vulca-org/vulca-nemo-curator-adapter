  "/src/vulca_curator_adapter/writers/jsonl.py",
  "/src/vulca_curator_adapter/writers/review_report.py",
  "/src/vulca_curator_adapter/writers/summary.py",
  "/src/vulca_curator_adapter/writers/visual_report.py",
  "/tests/test_nemo_image_writer.py",
  "/tests/test_nemo_parquet.py",
  "/tests/test_nemo_parquet_fixtures.py",
]
